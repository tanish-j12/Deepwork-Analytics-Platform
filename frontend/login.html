<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepWork Analytics - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center">

    <div class="bg-gray-800 p-10 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">DeepWork</h1>
            <p class="text-gray-400">Student & Admin Portal</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">University Email</label>
                <input type="email" id="email" placeholder="aarav@iiitd.ac.in" required 
                    class="w-full p-3 bg-gray-900 rounded border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" required 
                    class="w-full p-3 bg-gray-900 rounded border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold transition shadow-lg mt-4">
                Sign In
            </button>

            <p id="error-message" class="text-red-400 text-sm text-center hidden mt-4"></p>
        </form>
    </div>

    <script src="./js/auth.js"></script>
</body>
</html>
